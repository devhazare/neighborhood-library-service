version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: library_backend
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      DATABASE_URL: postgresql://library:library@postgres:5432/library_db
      SECRET_KEY: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PDF_UPLOAD_DIR: ./uploads/pdfs
      MAX_BORROW_DAYS: 14
      MAX_ACTIVE_BORROWINGS: 5
      FINE_PER_DAY: 0.50
      MAX_FINE_AMOUNT: 25.00
      DEBUG: "true"
      GRPC_PORT: 50051
    volumes:
      - pdf_uploads:/app/uploads/pdfs
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && (python scripts/generate_grpc.py || echo 'gRPC generation skipped') && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: library_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  pdf_uploads:
