syntax = "proto3";

package library.books;

import "common.proto";

option go_package = "library/books";

// Book Service - handles all book-related operations
service BookService {
  // Create a new book
  rpc CreateBook(CreateBookRequest) returns (BookResponse);

  // Get a book by ID
  rpc GetBook(library.common.IdRequest) returns (BookResponse);

  // List all books with pagination
  rpc ListBooks(library.common.PaginationRequest) returns (BookListResponse);

  // Update a book
  rpc UpdateBook(UpdateBookRequest) returns (BookResponse);

  // Delete a book
  rpc DeleteBook(library.common.IdRequest) returns (library.common.StatusResponse);

  // Upload PDF for a book
  rpc UploadBookPdf(UploadPdfRequest) returns (BookResponse);

  // Extract metadata from PDF using AI
  rpc ExtractPdfMetadata(ExtractPdfMetadataRequest) returns (PdfMetadataResponse);

  // Enrich book with AI-generated content
  rpc AiEnrichBook(library.common.IdRequest) returns (AiEnrichmentResponse);

  // Search books
  rpc SearchBooks(SearchBooksRequest) returns (BookListResponse);
}

// Book message - represents a book entity
message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  optional string isbn = 4;
  optional string publisher = 5;
  optional int32 published_year = 6;
  optional string category = 7;
  int32 total_copies = 8;
  int32 available_copies = 9;
  optional string shelf_location = 10;
  optional string summary = 11;
  repeated string tags = 12;
  optional string reading_level = 13;
  optional string recommended_for = 14;
  optional string pdf_file_path = 15;
  string created_at = 16;
  string updated_at = 17;
}

// Request to create a new book
message CreateBookRequest {
  string title = 1;
  string author = 2;
  optional string isbn = 3;
  optional string publisher = 4;
  optional int32 published_year = 5;
  optional string category = 6;
  int32 total_copies = 7;
  int32 available_copies = 8;
  optional string shelf_location = 9;
}

// Request to update an existing book
message UpdateBookRequest {
  string id = 1;
  optional string title = 2;
  optional string author = 3;
  optional string isbn = 4;
  optional string publisher = 5;
  optional int32 published_year = 6;
  optional string category = 7;
  optional int32 total_copies = 8;
  optional int32 available_copies = 9;
  optional string shelf_location = 10;
  optional string summary = 11;
  repeated string tags = 12;
  optional string reading_level = 13;
  optional string recommended_for = 14;
}

// Single book response
message BookResponse {
  Book book = 1;
}

// List of books response with pagination info
message BookListResponse {
  repeated Book items = 1;
  int32 total = 2;
  int32 skip = 3;
  int32 limit = 4;
}

// Request to upload PDF
message UploadPdfRequest {
  string book_id = 1;
  bytes pdf_content = 2;
  string filename = 3;
}

// Request to extract metadata from PDF
message ExtractPdfMetadataRequest {
  bytes pdf_content = 1;
  string filename = 2;
}

// Response with extracted PDF metadata
message PdfMetadataResponse {
  optional string title = 1;
  optional string author = 2;
  optional string isbn = 3;
  optional string publisher = 4;
  optional int32 published_year = 5;
  optional string category = 6;
}

// AI enrichment response
message AiEnrichmentResponse {
  optional string summary = 1;
  optional string genre = 2;
  repeated string tags = 3;
  optional string reading_level = 4;
  optional string recommended_for = 5;
}

// Search books request
message SearchBooksRequest {
  string query = 1;
  optional string category = 2;
  optional string author = 3;
  int32 skip = 4;
  int32 limit = 5;
}

