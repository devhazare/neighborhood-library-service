syntax = "proto3";

package library.members;

import "common.proto";

option go_package = "library/members";

// Member Service - handles all member-related operations
service MemberService {
  // Create a new member
  rpc CreateMember(CreateMemberRequest) returns (MemberResponse);

  // Get a member by ID
  rpc GetMember(library.common.IdRequest) returns (MemberResponse);

  // List all members with pagination
  rpc ListMembers(library.common.PaginationRequest) returns (MemberListResponse);

  // Update a member
  rpc UpdateMember(UpdateMemberRequest) returns (MemberResponse);

  // Delete a member
  rpc DeleteMember(library.common.IdRequest) returns (library.common.StatusResponse);

  // Get books borrowed by a member
  rpc GetMemberBorrowedBooks(library.common.IdRequest) returns (MemberBorrowedBooksResponse);

  // Get AI-powered book recommendations for a member
  rpc GetMemberRecommendations(library.common.IdRequest) returns (RecommendationsResponse);

  // Search members
  rpc SearchMembers(SearchMembersRequest) returns (MemberListResponse);
}

// Member status enum
enum MemberStatus {
  MEMBER_STATUS_UNSPECIFIED = 0;
  MEMBER_STATUS_ACTIVE = 1;
  MEMBER_STATUS_INACTIVE = 2;
}

// Member message - represents a library member
message Member {
  string id = 1;
  string membership_id = 2;
  string full_name = 3;
  optional string email = 4;
  optional string phone = 5;
  optional string address = 6;
  MemberStatus status = 7;
  optional string joined_date = 8;
  string created_at = 9;
  string updated_at = 10;
}

// Request to create a new member
message CreateMemberRequest {
  string membership_id = 1;
  string full_name = 2;
  optional string email = 3;
  optional string phone = 4;
  optional string address = 5;
  MemberStatus status = 6;
  optional string joined_date = 7;
}

// Request to update an existing member
message UpdateMemberRequest {
  string id = 1;
  optional string membership_id = 2;
  optional string full_name = 3;
  optional string email = 4;
  optional string phone = 5;
  optional string address = 6;
  optional MemberStatus status = 7;
  optional string joined_date = 8;
}

// Single member response
message MemberResponse {
  Member member = 1;
}

// List of members response with pagination info
message MemberListResponse {
  repeated Member items = 1;
  int32 total = 2;
  int32 skip = 3;
  int32 limit = 4;
}

// Borrowed book info for a member
message BorrowedBookInfo {
  string borrow_id = 1;
  string book_id = 2;
  string book_title = 3;
  string borrow_date = 4;
  string due_date = 5;
  optional string return_date = 6;
  string status = 7;
  int32 overdue_days = 8;
}

// Response with member's borrowed books
message MemberBorrowedBooksResponse {
  string member_id = 1;
  repeated BorrowedBookInfo borrowed_books = 2;
}

// Book recommendation with reason
message BookRecommendation {
  string book_id = 1;
  string title = 2;
  string author = 3;
  optional string category = 4;
  repeated string tags = 5;
  string reason = 6;
}

// Recommendations response
message RecommendationsResponse {
  string member_id = 1;
  repeated BookRecommendation recommendations = 2;
}

// Search members request
message SearchMembersRequest {
  string query = 1;
  optional MemberStatus status = 2;
  int32 skip = 3;
  int32 limit = 4;
}

